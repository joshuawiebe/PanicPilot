name: Build & Release

# Trigger on version tags (e.g. v1.0.0, v2.3.1)
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Build bundled executables ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PanicPilot-windows.zip
            dist_dir: dist/PanicPilot
          - os: macos-latest
            artifact_name: PanicPilot-macos.zip
            dist_dir: dist/PanicPilot
          - os: ubuntu-latest
            artifact_name: PanicPilot-linux.zip
            dist_dir: dist/PanicPilot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux only: install SDL2 and PortAudio system libraries
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportaudio2 libasound2-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller panicpilot.spec

      # ── Package as zip ─────────────────────────────────────────────────────
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.dist_dir }}" -DestinationPath "${{ matrix.artifact_name }}"

      - name: Package artifact (macOS / Linux)
        if: runner.os != 'Windows'
        run: zip -r "${{ matrix.artifact_name }}" "${{ matrix.dist_dir }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

  # ── Create GitHub Release and attach all platform zips ───────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PanicPilot ${{ github.ref_name }}
          body: |
            ## PanicPilot ${{ github.ref_name }}

            Bundled executables — no Python installation required.

            | Platform | File |
            |----------|------|
            | Windows  | `PanicPilot-windows.zip` |
            | macOS    | `PanicPilot-macos.zip` |
            | Linux    | `PanicPilot-linux.zip` |

            ### How to run
            1. Download the zip for your platform
            2. Extract it
            3. Run `PanicPilot` (or `PanicPilot.exe` on Windows) from the extracted folder

            ### Requirements
            - No Python needed — everything is bundled
            - Linux: may need `libsdl2` if not already installed (`sudo apt install libsdl2-2.0-0`)
          generate_release_notes: true
          files: |
            artifacts/PanicPilot-windows.zip/PanicPilot-windows.zip
            artifacts/PanicPilot-macos.zip/PanicPilot-macos.zip
            artifacts/PanicPilot-linux.zip/PanicPilot-linux.zip
          draft: false
          prerelease: false
